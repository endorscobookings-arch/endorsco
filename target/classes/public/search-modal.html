
<!-- Search Dialog Backdrop -->
<div id="search-dialog-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[99] hidden"></div>

<!-- Search Dialog -->
<div id="search-dialog" class="fixed inset-x-0 top-0 z-[100] mx-auto max-w-3xl px-4 sm:px-6 lg:px-8 pt-8 hidden">
  <div class="bg-white dark:bg-neutral-900 rounded-xl sm:rounded-2xl shadow-2xl overflow-hidden border border-neutral-200 dark:border-neutral-700">
    <!-- Header -->
    <div class="flex items-center gap-3 p-4 sm:p-6 border-b border-neutral-200 dark:border-neutral-700">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search h-5 w-5 text-primary-600 dark:text-primary-400">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input 
        type="text" 
        id="search-dialog-input" 
        class="flex-1 bg-transparent border-none outline-none text-lg text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400"
        placeholder="Search speakers by name..."
      />
      <button id="search-dialog-close" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x h-5 w-5 text-neutral-500">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Search Results Container -->
    <div id="search-results-container" class="max-h-[60vh] overflow-y-auto">
      <!-- Welcome Content -->
      <div id="search-welcome" class="p-6 text-center">
        <div class="relative inline-block mb-6">
          <div class="absolute inset-0 bg-gradient-to-r from-primary-500/20 to-blue-500/20 blur-3xl animate-pulse"></div>
          <div class="p-4 sm:p-6 bg-primary-100 dark:bg-primary-900/20 rounded-2xl relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users h-12 w-12 text-primary-600 dark:text-primary-400">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
        </div>
        <div class="space-y-2 sm:space-y-3">
          <h3 class="text-base sm:text-2xl lg:text-3xl font-bold text-neutral-900 dark:text-neutral-100">Discover World-Class Speakers</h3>
          <p class="text-neutral-600 dark:text-neutral-300 text-xs sm:text-base lg:text-lg leading-snug sm:leading-relaxed max-w-xl mx-auto">Search thousands of professional speakers and inspiring speakers for your next event</p>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-3 lg:gap-4 pt-2 sm:pt-4">
          <div class="flex flex-col items-center group p-2 sm:p-5 lg:p-6 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg sm:rounded-xl hover:border-primary-500 hover:shadow-md transition-all cursor-default">
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 rounded-lg sm:rounded-xl flex items-center justify-center mb-1.5 sm:mb-3 lg:mb-4 group-hover:scale-110 transition-transform shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user h-4 w-4 sm:h-5 sm:w-5 lg:h-6 lg:w-6 text-white">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <p class="text-[10px] sm:text-sm font-bold text-neutral-900 dark:text-neutral-100 leading-tight">Speakers</p>
            <p class="text-[9px] sm:text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 sm:mt-1 leading-tight">Pro speakers</p>
          </div>
          <div class="flex flex-col items-center group p-2 sm:p-5 lg:p-6 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg sm:rounded-xl hover:border-primary-500 hover:shadow-md transition-all cursor-default">
            <div class="bg-gradient-to-br from-violet-500 to-purple-600 w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 rounded-lg sm:rounded-xl flex items-center justify-center mb-1.5 sm:mb-3 lg:mb-4 group-hover:scale-110 transition-transform shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-grid3x3 h-4 w-4 sm:h-5 sm:w-5 lg:h-6 lg:w-6 text-white">
                <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                <path d="M3 9h18"></path>
                <path d="M3 15h18"></path>
                <path d="M9 3v18"></path>
                <path d="M15 3v18"></path>
              </svg>
            </div>
            <p class="text-[10px] sm:text-sm font-bold text-neutral-900 dark:text-neutral-100 leading-tight">Categories</p>
            <p class="text-[9px] sm:text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 sm:mt-1 leading-tight">By expertise</p>
          </div>
          <div class="flex flex-col items-center group p-2 sm:p-5 lg:p-6 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg sm:rounded-xl hover:border-primary-500 hover:shadow-md transition-all cursor-default">
            <div class="bg-gradient-to-br from-emerald-500 to-teal-600 w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 rounded-lg sm:rounded-xl flex items-center justify-center mb-1.5 sm:mb-3 lg:mb-4 group-hover:scale-110 transition-transform shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-text h-4 w-4 sm:h-5 sm:w-5 lg:h-6 lg:w-6 text-white">
                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                <path d="M10 9H8"></path>
                <path d="M16 13H8"></path>
                <path d="M16 17H8"></path>
              </svg>
            </div>
            <p class="text-[10px] sm:text-sm font-bold text-neutral-900 dark:text-neutral-100 leading-tight">Articles</p>
            <p class="text-[9px] sm:text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 sm:mt-1 leading-tight">Insights</p>
          </div>
          <div class="flex flex-col items-center group p-2 sm:p-5 lg:p-6 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg sm:rounded-xl hover:border-primary-500 hover:shadow-md transition-all cursor-default">
            <div class="bg-gradient-to-br from-amber-500 to-orange-600 w-8 h-8 sm:w-10 sm:h-10 lg:w-12 lg:h-12 rounded-lg sm:rounded-xl flex items-center justify-center mb-1.5 sm:mb-3 lg:mb-4 group-hover:scale-110 transition-transform shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-list h-4 w-4 sm:h-5 sm:w-5 lg:h-6 lg:w-6 text-white">
                <line x1="8" x2="21" y1="6" y2="6"></line>
                <line x1="8" x2="21" y1="12" y2="12"></line>
                <line x1="8" x2="21" y1="18" y2="18"></line>
                <line x1="3" x2="3.01" y1="6" y2="6"></line>
                <line x1="3" x2="3.01" y1="12" y2="12"></line>
                <line x1="3" x2="3.01" y1="18" y2="18"></line>
              </svg>
            </div>
            <p class="text-[10px] sm:text-sm font-bold text-neutral-900 dark:text-neutral-100 leading-tight">Lists</p>
            <p class="text-[9px] sm:text-xs text-neutral-500 dark:text-neutral-400 mt-0.5 sm:mt-1 leading-tight">Collections</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
